<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UNO Voice | Cognitive Intelligence Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg: #05050a;
  --surface: #0d0d17;
  --surface2: #12121f;
  --surface3: #17172a;
  --border: rgba(255,255,255,0.06);
  --border-glow: rgba(120,100,255,0.25);
  --text: #e8e8f0;
  --text-muted: #6b6b8a;
  --text-dim: #3a3a55;
  --accent-violet: #7c6dff;
  --accent-indigo: #5b4fff;
  --accent-cyan: #00d4c8;
  --accent-rose: #ff4d8d;
  --accent-amber: #f59e0b;
  --glow-violet: rgba(124,109,255,0.15);
  --glow-cyan: rgba(0,212,200,0.1);
  --radius: 20px;
  --radius-sm: 12px;
  --radius-pill: 100px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow-x: hidden;
  overflow-y: auto;
}

/* ── CANVAS BACKGROUND ── */
.canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}
.canvas::before {
  content: '';
  position: absolute;
  width: 900px; height: 900px;
  top: -200px; left: -200px;
  background: radial-gradient(circle, rgba(92,79,255,0.08) 0%, transparent 65%);
  animation: drift1 18s ease-in-out infinite alternate;
}
.canvas::after {
  content: '';
  position: absolute;
  width: 700px; height: 700px;
  bottom: -100px; right: -100px;
  background: radial-gradient(circle, rgba(0,212,200,0.07) 0%, transparent 65%);
  animation: drift2 22s ease-in-out infinite alternate;
}
@keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(80px,60px) scale(1.1); } }
@keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-60px,-80px) scale(1.15); } }

.grid-overlay {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: 
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

/* ── LAYOUT ── */
.app {
  position: relative; z-index: 10;
  min-height: 100vh;
  padding: 32px 24px 60px;
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ── TOP NAV ── */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
  animation: fadeDown 0.6s cubic-bezier(0.2,0.8,0.2,1) both;
}
@keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }

.logo-group { display: flex; align-items: center; gap: 14px; }

.logo-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-indigo));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 30px rgba(124,109,255,0.35);
  position: relative;
  overflow: hidden;
}
.logo-icon::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
  border-radius: inherit;
}

.logo-text {
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #fff;
}
.logo-text span { color: var(--accent-violet); }

.nav-badge {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent-cyan);
  background: rgba(0,212,200,0.1);
  border: 1px solid rgba(0,212,200,0.2);
  padding: 4px 12px;
  border-radius: var(--radius-pill);
}

.nav-controls { display: flex; align-items: center; gap: 12px; }

.lang-select-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  font-size: 0.8rem;
  color: var(--text-muted);
  transition: 0.2s;
}
.lang-select-wrap:hover { border-color: var(--border-glow); color: var(--text); }
.lang-select-wrap i { color: var(--accent-violet); font-size: 0.75rem; }
.lang-select-wrap select {
  background: none; border: none; color: inherit;
  font-family: inherit; font-size: inherit;
  cursor: pointer; outline: none;
  font-weight: 500;
}
.lang-select-wrap select option { background: #1a1a2e; }

/* ── MAIN GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 20px;
  animation: fadeUp 0.7s 0.1s cubic-bezier(0.2,0.8,0.2,1) both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

/* ── PANEL BASE ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}
.panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(124,109,255,0.03) 0%, transparent 50%);
  pointer-events: none;
  border-radius: inherit;
}
.panel:hover { border-color: rgba(124,109,255,0.15); }

/* ── INPUT PANEL ── */
.input-panel { display: flex; flex-direction: column; gap: 22px; }

.panel-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.panel-label i { color: var(--accent-violet); font-size: 0.65rem; }

.voice-area {
  position: relative;
}

.textarea-shell {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
}
.textarea-shell::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, var(--border-glow), var(--border), var(--border));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
}
.textarea-shell:focus-within::before { opacity: 1; }

textarea#inputBox {
  width: 100%;
  min-height: 240px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px 24px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 300;
  line-height: 1.8;
  resize: none;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
}
textarea#inputBox:focus {
  outline: none;
  background: rgba(18,18,31,0.9);
  border-color: rgba(124,109,255,0.3);
  box-shadow: 0 0 40px rgba(124,109,255,0.08), inset 0 1px 0 rgba(255,255,255,0.03);
}
textarea#inputBox::placeholder { color: var(--text-dim); }

.voice-status {
  position: absolute;
  top: 16px; right: 16px;
  display: flex; align-items: center; gap: 7px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #ff6b8a;
  background: rgba(255,77,141,0.08);
  border: 1px solid rgba(255,77,141,0.15);
  padding: 5px 12px;
  border-radius: var(--radius-pill);
  opacity: 0;
  transform: scale(0.9);
  transition: all 0.3s;
  pointer-events: none;
}
.voice-status.active { opacity: 1; transform: scale(1); }
.voice-dot {
  width: 6px; height: 6px;
  background: var(--accent-rose);
  border-radius: 50%;
  animation: pulse-dot 1.2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }

/* ── ACTION BUTTONS ── */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  padding: 14px 20px;
  border-radius: 14px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
  white-space: nowrap;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.06) 0%, transparent 100%);
  border-radius: inherit;
  pointer-events: none;
}
.btn i { font-size: 0.8rem; }

.btn-start {
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-indigo));
  color: #fff;
  box-shadow: 0 4px 20px rgba(124,109,255,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(124,109,255,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-start:active { transform: translateY(0) scale(0.98); }

.btn-stop {
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.btn-stop:hover { background: var(--surface3); color: var(--text); border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }

.btn-analyze {
  grid-column: span 2;
  padding: 17px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid var(--border-glow);
  color: #fff;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.3px;
  position: relative;
  overflow: hidden;
}
.btn-analyze::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(124,109,255,0.15) 0%, rgba(0,212,200,0.08) 100%);
  border-radius: inherit;
  opacity: 0;
  transition: opacity 0.3s;
}
.btn-analyze:hover::before { opacity: 1; }
.btn-analyze:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(124,109,255,0.2);
  border-color: rgba(124,109,255,0.4);
}

.btn-util {
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.btn-util:hover { background: var(--surface3); color: var(--text); transform: translateY(-1px); }

/* ── SIDEBAR ── */
.sidebar { display: flex; flex-direction: column; gap: 16px; }

/* ── OUTPUT PANEL ── */
.output-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 0;
}

.output-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.output-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.7rem; font-weight: 600;
  letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--text-dim);
}
.output-label i { color: var(--accent-cyan); font-size: 0.65rem; }

.status-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--accent-cyan);
  background: rgba(0,212,200,0.07);
  border: 1px solid rgba(0,212,200,0.15);
  padding: 4px 10px;
  border-radius: var(--radius-pill);
}
.status-dot {
  width: 5px; height: 5px;
  background: var(--accent-cyan);
  border-radius: 50%;
}

.output-body {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  flex: 1;
  min-height: 140px;
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--text-muted);
  transition: 0.3s;
}

.output-body.has-content { color: var(--text); }

/* ── MEMORY PANEL ── */
.memory-panel { display: flex; flex-direction: column; gap: 14px; }

.memory-header {
  display: flex; align-items: center;
  justify-content: space-between;
}

.memory-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.7rem; font-weight: 600;
  letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--text-dim);
}
.memory-label i { color: var(--accent-amber); font-size: 0.65rem; }

.btn-trash {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer;
  color: var(--text-dim); font-size: 0.7rem;
  transition: 0.2s;
}
.btn-trash:hover { color: var(--accent-rose); border-color: rgba(255,77,141,0.25); background: rgba(255,77,141,0.05); }

.history-scroll {
  max-height: 260px;
  overflow-y: auto;
  padding-right: 4px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.history-scroll::-webkit-scrollbar { width: 3px; }
.history-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }
.history-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent-violet); }

.history-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 2px solid var(--accent-violet);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.78rem;
  line-height: 1.5;
  color: var(--text-muted);
  animation: itemIn 0.35s cubic-bezier(0.2,0.8,0.2,1) both;
  transition: 0.2s;
}
.history-item:hover { background: var(--surface3); color: var(--text); border-color: rgba(124,109,255,0.2); }
@keyframes itemIn { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:translateX(0); } }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 24px;
  color: var(--text-dim); font-size: 0.78rem; text-align: center;
}
.empty-icon {
  width: 40px; height: 40px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-dim);
}

/* ── STATS BAR ── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  animation: fadeUp 0.8s 0.2s cubic-bezier(0.2,0.8,0.2,1) both;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  display: flex; align-items: center; gap: 14px;
  position: relative; overflow: hidden;
  transition: 0.3s;
}
.stat-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--stat-color, var(--accent-violet));
  border-radius: 0 2px 2px 0;
}
.stat-card:hover { border-color: rgba(124,109,255,0.15); transform: translateY(-2px); }

.stat-icon {
  width: 36px; height: 36px;
  background: rgba(124,109,255,0.08);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--stat-color, var(--accent-violet));
  flex-shrink: 0;
}

.stat-content { min-width: 0; }
.stat-value {
  font-family: 'Syne', sans-serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-label {
  font-size: 0.68rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  margin-top: 4px;
}

/* ── LOADER ANIMATION ── */
@keyframes spin { to { transform: rotate(360deg); } }
.fa-spin { animation: spin 0.8s linear infinite; }

/* ── THINKING SHIMMER ── */
.thinking {
  display: flex; align-items: center; gap: 8px;
  color: var(--text-dim); font-size: 0.82rem;
}
.shimmer-dots { display: flex; gap: 4px; }
.shimmer-dot {
  width: 5px; height: 5px;
  background: var(--accent-violet);
  border-radius: 50%;
  animation: bounce-dot 1.2s ease-in-out infinite;
}
.shimmer-dot:nth-child(2) { animation-delay: 0.2s; }
.shimmer-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce-dot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .app { padding: 20px 16px 48px; }
}
@media (max-width: 500px) {
  .stats-bar { grid-template-columns: 1fr; }
  .actions { grid-template-columns: 1fr 1fr; }
  .logo-text { font-size: 1.2rem; }
}
</style>
</head>
<body>

<div class="canvas"></div>
<div class="grid-overlay"></div>

<div class="app">

  <!-- NAV -->
  <nav class="nav">
    <div class="logo-group">
      <div class="logo-icon">
        <i class="fas fa-wave-square" style="color:#fff;position:relative;z-index:1;font-size:16px;"></i>
      </div>
      <div class="logo-text">UNO<span>Voice</span></div>
    </div>
    <div class="nav-badge">Cognitive Insight Engine</div>
    <div class="nav-controls">
      <div class="lang-select-wrap">
        <i class="fas fa-globe"></i>
        <select id="languageSelect">
          <option value="en-US">English (US)</option>
          <option value="bn-BD">বাংলা (BD)</option>
        </select>
      </div>
    </div>
  </nav>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- LEFT: INPUT PANEL -->
    <div class="panel input-panel">
      <div class="panel-label">
        <i class="fas fa-microphone-lines"></i>
        Voice Intelligence Input
      </div>

      <div class="voice-area">
        <div class="textarea-shell">
          <textarea id="inputBox" placeholder="Start speaking or type your thoughts... The AI will transform them into strategic intelligence."></textarea>
        </div>
        <div class="voice-status" id="voiceIndicator">
          <div class="voice-dot"></div>
          Live
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-start" id="startBtn">
          <i class="fas fa-microphone"></i> Start Session
        </button>
        <button class="btn btn-stop" id="stopBtn">
          <i class="fas fa-stop-circle"></i> Stop
        </button>
        <button class="btn btn-analyze" id="analyzeBtn">
          <i class="fas fa-brain"></i>&nbsp; Generate Intelligence Report
        </button>
        <button class="btn btn-util" id="copyBtn">
          <i class="fas fa-copy"></i> Copy
        </button>
        <button class="btn btn-util" id="clearBtn">
          <i class="fas fa-eraser"></i> Clear
        </button>
      </div>
    </div>

    <!-- RIGHT: SIDEBAR -->
    <div class="sidebar">

      <!-- AI OUTPUT -->
      <div class="panel output-panel">
        <div class="output-header">
          <div class="output-label">
            <i class="fas fa-bolt"></i>
            AI Strategic Output
          </div>
          <div class="status-pill">
            <div class="status-dot"></div>
            Ready
          </div>
        </div>
        <div class="output-body" id="output">
          Your intelligence report will appear here after analysis...
        </div>
      </div>

      <!-- MEMORY -->
      <div class="panel memory-panel">
        <div class="memory-header">
          <div class="memory-label">
            <i class="fas fa-layer-group"></i>
            Session Memory
          </div>
          <button class="btn-trash" id="clearMemoryBtn" title="Clear all memory">
            <i class="fas fa-trash"></i>
          </button>
        </div>
        <div class="history-scroll" id="historyList">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon"><i class="fas fa-inbox"></i></div>
            No sessions recorded yet
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-card" style="--stat-color: var(--accent-violet);">
      <div class="stat-icon"><i class="fas fa-microphone"></i></div>
      <div class="stat-content">
        <div class="stat-value" id="sessionCount">0</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>
    <div class="stat-card" style="--stat-color: var(--accent-cyan);">
      <div class="stat-icon" style="background:rgba(0,212,200,0.08);"><i class="fas fa-text-width"></i></div>
      <div class="stat-content">
        <div class="stat-value" id="wordCount">0</div>
        <div class="stat-label">Words Captured</div>
      </div>
    </div>
    <div class="stat-card" style="--stat-color: var(--accent-amber);">
      <div class="stat-icon" style="background:rgba(245,158,11,0.08);color:var(--accent-amber);"><i class="fas fa-brain"></i></div>
      <div class="stat-content">
        <div class="stat-value" id="insightCount">0</div>
        <div class="stat-label">Insights Generated</div>
      </div>
    </div>
  </div>

</div>

<script>
  let recognition, finalText = "", lastText = "", isListening = false;
  let sessionCount = 0, insightCount = 0;

  const inputBox = document.getElementById("inputBox");
  const outputDiv = document.getElementById("output");
  const historyList = document.getElementById("historyList");
  const voiceIndicator = document.getElementById("voiceIndicator");
  const emptyState = document.getElementById("emptyState");
  const wordCountEl = document.getElementById("wordCount");
  const sessionCountEl = document.getElementById("sessionCount");
  const insightCountEl = document.getElementById("insightCount");

  function updateWordCount() {
    const words = inputBox.value.trim().split(/\s+/).filter(w => w.length > 0).length;
    wordCountEl.textContent = words;
  }

  inputBox.addEventListener("input", updateWordCount);

  function updateUI(active) {
    if (active) {
      voiceIndicator.classList.add("active");
    } else {
      voiceIndicator.classList.remove("active");
    }
  }

  function startListening() {
    if (isListening) return;
    const lang = document.getElementById("languageSelect").value;
    try {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = lang;
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.start();
      isListening = true;
      updateUI(true);
      recognition.onresult = (e) => {
        let current = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          current += e.results[i][0].transcript;
        }
        if (current !== lastText) {
          finalText += current.replace(lastText, "") + " ";
          lastText = current;
        }
        inputBox.value = finalText;
        updateWordCount();
      };
      recognition.onend = () => {
        if (isListening) recognition.start();
        else updateUI(false);
      };
    } catch(e) {
      alert("Speech Recognition is not supported in this browser.");
    }
  }

  function stopListening() {
    isListening = false;
    if (recognition) recognition.stop();
    updateUI(false);

    const text = inputBox.value.trim();
    if (text) {
      sessionCount++;
      sessionCountEl.textContent = sessionCount;
      addHistoryItem(text);
    }
  }

  function addHistoryItem(text) {
    if (emptyState) emptyState.remove();
    const item = document.createElement("div");
    item.className = "history-item";
    const preview = text.length > 70 ? text.substring(0, 70) + "…" : text;
    item.textContent = preview;
    historyList.prepend(item);
  }

  const API_KEY = "AIzaSyC_NUs08meLRpzejk5pET7o1D30N2HOFwA";

  async function analyzeText() {
    const text = inputBox.value.trim();
    if (!text) return;

    outputDiv.classList.remove("has-content");
    outputDiv.innerHTML = `
      <div class="thinking">
        <div class="shimmer-dots">
          <div class="shimmer-dot"></div>
          <div class="shimmer-dot"></div>
          <div class="shimmer-dot"></div>
        </div>
        <span>Generating intelligence...</span>
      </div>
    `;

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `Summarize this into one professional insight: ${text}`
            }]
          }]
        })
      });
      const data = await res.json();
      const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Analysis complete.";
      outputDiv.innerHTML = '';
      outputDiv.textContent = result;
      outputDiv.classList.add("has-content");
      insightCount++;
      insightCountEl.textContent = insightCount;
    } catch(err) {
      outputDiv.innerHTML = '';
      outputDiv.textContent = "API limit reached or network error. Please try again.";
    }
  }

  document.getElementById("startBtn").onclick = startListening;
  document.getElementById("stopBtn").onclick = stopListening;
  document.getElementById("analyzeBtn").onclick = analyzeText;

  document.getElementById("clearBtn").onclick = () => {
    inputBox.value = "";
    finalText = "";
    updateWordCount();
  };

  document.getElementById("copyBtn").onclick = () => {
    if (!inputBox.value.trim()) return;
    navigator.clipboard.writeText(inputBox.value).then(() => {
      const btn = document.getElementById("copyBtn");
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
      btn.style.color = 'var(--accent-cyan)';
      btn.style.borderColor = 'rgba(0,212,200,0.3)';
      setTimeout(() => {
        btn.innerHTML = orig;
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 1800);
    });
  };

  document.getElementById("clearMemoryBtn").onclick = () => {
    if (confirm("Clear all session memory?")) {
      historyList.innerHTML = '';
      const es = document.createElement('div');
      es.className = 'empty-state';
      es.id = 'emptyState';
      es.innerHTML = '<div class="empty-icon"><i class="fas fa-inbox"></i></div>No sessions recorded yet';
      historyList.appendChild(es);
    }
  };
</script>

</body>
</html>
