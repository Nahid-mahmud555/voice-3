<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UNO Voice | Pro AI Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg: #030712;
    --primary: #6366f1;
    --secondary: #a855f7;
    --accent: #22d3ee;
    --glass: rgba(255, 255, 255, 0.02);
    --border: rgba(255, 255, 255, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    min-height: 100vh;
    background-color: var(--bg);
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: #f3f4f6;
    /* এখন স্ক্রল করা যাবে */
    overflow-y: auto;
    position: relative;
  }

  /* --- DYNAMIC MESH BACKGROUND --- */
  .bg-glow {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    background: 
      radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
    filter: blur(80px);
  }

  /* --- ENTRANCE ANIMATION --- */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 1050px;
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 24px;
    background: var(--glass);
    backdrop-filter: blur(40px);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 40px;
    box-shadow: 0 50px 100px rgba(0,0,0,0.6);
    animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* --- LEFT PANEL --- */
  .main-hub { display: flex; flex-direction: column; gap: 28px; }

  header h1 {
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 40%, var(--primary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    background: rgba(99, 102, 241, 0.1);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    border: 1px solid rgba(99, 102, 241, 0.2);
  }

  textarea {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 28px;
    color: #fff;
    font-size: 1.1rem;
    resize: none;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    min-height: 220px;
  }

  textarea:focus {
    background: rgba(255, 255, 255, 0.06);
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
    transform: translateY(-2px);
  }

  /* --- BUTTONS & ANIMATIONS --- */
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .btn {
    padding: 18px;
    border-radius: 22px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.3s ease;
    font-size: 1rem;
  }

  .btn-primary { 
    background: #fff; 
    color: #000; 
  }
  
  .btn-primary:hover { 
    transform: translateY(-4px) scale(1.02); 
    box-shadow: 0 15px 30px rgba(255,255,255,0.15); 
  }

  .btn-dark { 
    background: rgba(255,255,255,0.05); 
    color: #fff; 
    border: 1px solid var(--border); 
  }

  .btn-dark:hover { 
    background: rgba(255,255,255,0.1); 
    transform: translateY(-2px); 
  }

  .btn-glow {
    grid-column: span 2;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    font-size: 1.1rem;
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
  }

  .btn-glow:hover {
    box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5);
    transform: translateY(-4px);
  }

  /* --- RIGHT PANEL --- */
  .sidebar { display: flex; flex-direction: column; gap: 24px; }

  .panel {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 30px;
    transition: all 0.3s ease;
  }

  .panel:hover {
    border-color: rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.04);
  }

  .panel-title {
    font-size: 0.75rem;
    font-weight: 800;
    color: #64748b;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: 1px;
  }

  #output { font-size: 1.05rem; line-height: 1.8; color: #cbd5e1; }

  .history-item {
    font-size: 0.9rem;
    padding: 16px;
    border-radius: 16px;
    background: rgba(0,0,0,0.2);
    margin-bottom: 12px;
    border-left: 4px solid var(--primary);
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* --- STATUS BADGES --- */
  .rec-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    font-weight: 800;
    color: #f87171;
    background: rgba(248, 113, 113, 0.08);
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid rgba(248, 113, 113, 0.2);
  }

  .dot { width: 10px; height: 10px; background: #f87171; border-radius: 50%; box-shadow: 0 0 15px #f87171; animation: blink 1s infinite; }

  @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }

  @media (max-width: 950px) {
    .container { grid-template-columns: 1fr; padding: 30px; }
    body { padding: 20px; align-items: flex-start; }
    header h1 { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
  <!-- Left Section -->
  <div class="main-hub">
    <header>
      <div class="tag">Next-Gen Intelligence</div>
      <h1>UNO Voice</h1>
    </header>

    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div class="panel-title" style="margin:0;">
        <i class="fas fa-language"></i>
        <select id="languageSelect" style="background:none; color:#fff; border:none; font-weight:700; cursor:pointer; font-size: 0.9rem;">
          <option value="en-US">English (Global)</option>
          <option value="bn-BD">বাংলা (Standard)</option>
        </select>
      </div>
      <div id="voiceIndicator"></div>
    </div>

    <textarea id="inputBox" placeholder="Start your brainstorming session... Capture every insight."></textarea>

    <div class="actions">
      <button class="btn btn-primary" id="startBtn"><i class="fas fa-microphone-alt"></i> Start Session</button>
      <button class="btn btn-dark" id="stopBtn"><i class="fas fa-square"></i> Stop</button>
      <button class="btn btn-glow" id="analyzeBtn"><i class="fas fa-wand-magic-sparkles"></i> Synthesize Idea</button>
      <button class="btn btn-dark" id="copyBtn"><i class="fas fa-fingerprint"></i> Copy Data</button>
      <button class="btn btn-dark" id="clearBtn"><i class="fas fa-trash-can"></i> Flush Cache</button>
    </div>
  </div>

  <!-- Right Section -->
  <div class="sidebar">
    <div class="panel output-box">
      <div class="panel-title"><i class="fas fa-bolt"></i> AI Strategic Output</div>
      <div id="output">Your cognitive map will appear here.</div>
    </div>

    <div class="panel">
      <div class="panel-title"><i class="fas fa-history"></i> Session Memory</div>
      <div id="history"></div>
    </div>
  </div>
</div>

<script>
  let recognition, finalText = "", lastText = "", isListening = false;
  const inputBox = document.getElementById("inputBox"), outputDiv = document.getElementById("output");
  const historyDiv = document.getElementById("history"), voiceIndicator = document.getElementById("voiceIndicator");

  function updateUI(active) {
    voiceIndicator.innerHTML = active ? '<div class="rec-indicator"><div class="dot"></div>CAPTURE ACTIVE</div>' : '';
  }

  function startListening() {
    if (isListening) return;
    const lang = document.getElementById("languageSelect").value;
    try {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = lang; recognition.continuous = true; recognition.interimResults = true;
      recognition.start(); isListening = true; updateUI(true);
      recognition.onresult = (e) => {
        let current = "";
        for (let i = e.resultIndex; i < e.results.length; i++) current += e.results[i][0].transcript;
        if (current !== lastText) { finalText += current.replace(lastText, "") + " "; lastText = current; }
        inputBox.value = finalText;
      };
      recognition.onend = () => { if (isListening) recognition.start(); else updateUI(false); };
    } catch(e) { alert("System Speech API not responsive."); }
  }

  function stopListening() { 
    isListening = false; 
    if (recognition) recognition.stop(); 
    updateUI(false);
    if(inputBox.value.trim()){
      const item = document.createElement("div");
      item.className = "history-item";
      item.innerText = inputBox.value.substring(0, 50) + "...";
      historyDiv.prepend(item);
    }
  }

  const GEMINI_API_KEY = "AIzaSyC_NUs08meLRpzejk5pET7o1D30N2HOFwA";

  async function analyzeText() {
    const text = inputBox.value.trim();
    if (!text) return;
    outputDiv.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing Neural Data...';
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: `Generate a short business concept from this: ${text}` }] }] })
      });
      const data = await response.json();
      outputDiv.innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Synthesis complete.";
    } catch(err) { outputDiv.innerText = "Connection lost to Gemini Node."; }
  }

  document.getElementById("startBtn").onclick = startListening;
  document.getElementById("stopBtn").onclick = stopListening;
  document.getElementById("analyzeBtn").onclick = analyzeText;
  document.getElementById("clearBtn").onclick = () => { inputBox.value = ""; finalText = ""; };
  document.getElementById("copyBtn").onclick = () => { 
    navigator.clipboard.writeText(inputBox.value);
    const original = document.getElementById("copyBtn").innerHTML;
    document.getElementById("copyBtn").innerHTML = "<i class='fas fa-check'></i> Copied";
    setTimeout(() => document.getElementById("copyBtn").innerHTML = original, 2000);
  };
</script>

</body>
</html>
